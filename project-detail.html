<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Detail — Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">MNE<span class="dot">.</span></a>
      <div style="margin-left:auto;"> 
        <a href="index.html#projects" class="btn btn-ghost">Kembali ke Beranda</a>
      </div>
    </div>
  </nav>

  <main class="container detail-page" style="padding-top: calc(var(--nav-h) + 2rem);">
    <div id="detail-root">
      <div class="detail-hero">
        <div class="detail-media">
          <img id="detail-main-img" src="" alt="Project image">
        </div>
        <div class="detail-meta">
          <div class="section-label">Proyek</div>
          <h1 id="detail-title" class="section-title">Judul Proyek</h1>
          <p id="detail-desc" class="project-desc">Deskripsi proyek mendalam.</p>
          <div id="detail-tags" class="project-tags"></div>
          <div style="margin-top:1rem;">
            <a id="detail-github" href="#" target="_blank" rel="noopener" class="btn btn-primary">Lihat Dokumentasi</a>
          </div>
        </div>
      </div>

      <h3 style="margin:2rem 0 .75rem 0;">Galeri</h3>
      <div id="gallery" class="gallery-grid"></div>
    </div>
  </main>

  <script>
  const projects = {
      todo: {
        title: 'Aplikasi To-Do List',
        desc: 'Aplikasi To-Do List adalah aplikasi manajemen tugas yang dibangun menggunakan Java dan MariaDB. Aplikasi ini memungkinkan pengguna untuk membuat, membaca, memperbarui, dan menghapus tugas (CRUD) dengan antarmuka yang sederhana dan mudah digunakan. Fitur penandaan selesai membantu pengguna melacak tugas yang telah diselesaikan. Semua data tugas disimpan secara lokal dalam database MariaDB menggunakan koneksi JDBC, sehingga data tetap tersedia meskipun aplikasi ditutup dan dibuka kembali.',
        tags: ['Java','MariaDB','JDBC'],
        github: 'https://github.com/ItsShinsei/Java-ToDo-App',
        images: ['images/projects/todo.png','images/projects/todo1.png','images/projects/todo2.png']
      },
      absen: {
        title: 'Sistem Absensi Ekstrakurikuler',
        desc: 'Sistem Absensi Ekstrakurikuler adalah aplikasi berbasis web yang dirancang untuk mengelola kehadiran siswa dalam kegiatan ekstrakurikuler. Dibangun dengan PHP Native dan MySQL, sistem ini menyediakan antarmuka yang intuitif untuk mencatat kehadiran setiap pertemuan. Fitur laporan memungkinkan guru atau pembina untuk melihat ringkasan kehadiran per siswa atau per kegiatan.',
        tags: ['PHP Native','MySQL','HTML/CSS'],
        github: 'https://github.com/ItsShinsei/absen_ekstra_PHP_Native',
        images: ['images/projects/absen.png','images/projects/absen1.png','images/projects/absen2.png']
      },
      figma: {
        title: 'UI Design using Figma',
        desc: 'Koleksi desain antarmuka pengguna (UI) yang dibuat menggunakan Figma. Portofolio ini mencakup berbagai desain UI untuk website dan aplikasi, prototype interaktif yang mensimulasikan alur pengguna, serta aset desain seperti icon, komponen, dan style guide yang siap diimplementasikan dalam pengembangan front-end. Desain-desain ini mencerminkan pemahaman tentang prinsip desain modern, konsistensi visual, dan pengalaman pengguna (UX) yang baik.',
        tags: ['Figma'],
        github: 'https://www.figma.com/design/btpLIYWNnXvhQW4QdZt3gJ/Shinsei-s-project?node-id=0-1&t=yiruVt4WcXuvvSS1-1',
        images: ['images/projects/figma.png','images/projects/figma1.png','images/projects/figma2.png','images/projects/figma3.png','images/projects/figma4.png']
      }
    };
    function qs(q) { return document.querySelector(q); }
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'todo';
    const data = projects[id] || projects.todo;

    qs('#detail-title').textContent = data.title;
    qs('#detail-desc').textContent = data.desc;
    qs('#detail-github').href = data.github;
    qs('#detail-main-img').src = data.images[0];

    const tagsEl = qs('#detail-tags');
    data.tags.forEach(t => {
      const s = document.createElement('span');
      s.textContent = t;
      tagsEl.appendChild(s);
    });

    const gallery = qs('#gallery');
    data.images.forEach(src => {
      const thumb = document.createElement('div');
      thumb.className = 'gallery-thumb';
      const img = document.createElement('img');
      img.src = src;
      img.alt = data.title;
      img.addEventListener('click', () => { qs('#detail-main-img').src = src; });
      thumb.appendChild(img);
      gallery.appendChild(thumb);
    });
  </script>
</body>
</html>
